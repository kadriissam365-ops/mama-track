<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Mama silhouette (pregnant woman) -->
  <ellipse cx="256" cy="200" rx="55" ry="55" fill="url(#heartGrad)" opacity="0.95"/>
  
  <!-- Belly -->
  <ellipse cx="256" cy="320" rx="85" ry="95" fill="url(#heartGrad)" opacity="0.95"/>
  
  <!-- Baby inside belly (small heart) -->
  <path d="M256 330 C256 330 238 316 238 305 C238 296 244 290 256 300 C268 290 274 296 274 305 C274 316 256 330 256 330Z" fill="#f472b6" opacity="0.7"/>
  
  <!-- Small stars around -->
  <circle cx="160" cy="180" r="8" fill="white" opacity="0.6"/>
  <circle cx="355" cy="160" r="6" fill="white" opacity="0.5"/>
  <circle cx="380" cy="280" r="5" fill="white" opacity="0.4"/>
  <circle cx="135" cy="300" r="6" fill="white" opacity="0.5"/>
  
  <!-- Sparkle top right -->
  <path d="M370 120 L374 130 L384 134 L374 138 L370 148 L366 138 L356 134 L366 130 Z" fill="white" opacity="0.8"/>
</svg>
